services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediapipeline
      POSTGRES_PASSWORD: mediapipeline
      POSTGRES_DB: mediapipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediapipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://mediapipeline:mediapipeline@postgres:5432/mediapipeline?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    command: node dist/server.js
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://mediapipeline:mediapipeline@postgres:5432/mediapipeline?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_DIR: uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    restart: unless-stopped
    command: node dist/workers/analysis.worker.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mediapipeline:mediapipeline@postgres:5432/mediapipeline?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_DIR: uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Scale independently of the API tier under heavier processing load, e.g.:
    #   docker compose up --scale worker=3

volumes:
  postgres_data:
  uploads_data:
