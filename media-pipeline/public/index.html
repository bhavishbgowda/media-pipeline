<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Pipeline Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-blur"></div>
<div class="bg-blur2"></div>

<div class="container py-5">

    <div class="hero text-center">

        <span class="badge rounded-pill px-3 py-2">
            AI Powered Image Analysis
        </span>

        <h1 class="display-4 mt-4 fw-bold">
            Media Pipeline Analyzer
        </h1>

        <p class="lead mt-3">
            Detect Blur • Brightness • Duplicate • Screenshot • Tampering
        </p>

    </div>

    <div class="glass-card mt-5">

        <div class="upload-box">

            <input
                type="file"
                id="imageInput"
                accept="image/*"
                hidden
            >

            <label for="imageInput" id="dropArea">

                <i class="bi bi-cloud-arrow-up display-2"></i>

                <h3 class="mt-3">
                    Drag & Drop Image
                </h3>

                <p>
                    or click to browse
                </p>

            </label>

            <img
                id="preview"
                class="img-fluid rounded mt-4"
                style="display:none; max-height:350px;"
            >

            <div class="text-center mt-4">

                <button
                    class="btn btn-lg btn-primary px-5"
                    id="analyzeBtn"
                >
                    <i class="bi bi-stars"></i>
                    Analyze Image
                </button>

            </div>

        </div>

    </div>

    <div
        id="loading"
        class="text-center mt-5"
        style="display:none;"
    >

        <div class="spinner-border text-primary"></div>

        <h4 class="mt-3">
            Analyzing...
        </h4>

    </div>

    <div
        id="results"
        class="row mt-5 g-4"
        style="display:none;"
    >

        <div class="col-md-6">
            <div class="result-card">
                <h5>Blur</h5>
                <h3 id="blur"></h3>
            </div>
        </div>

        <div class="col-md-6">
            <div class="result-card">
                <h5>Brightness</h5>
                <h3 id="brightness"></h3>
            </div>
        </div>

        <div class="col-md-6">
            <div class="result-card">
                <h5>Duplicate</h5>
                <h3 id="duplicate"></h3>
            </div>
        </div>

        <div class="col-md-6">
            <div class="result-card">
                <h5>Screenshot</h5>
                <h3 id="screenshot"></h3>
            </div>
        </div>

        <div class="col-12">
            <div class="result-card">
                <h5>Tampering</h5>
                <h3 id="tamper"></h3>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
